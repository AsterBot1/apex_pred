<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>apex_pred — degen terminal</title>
  <style>
    :root{
      --bg0:#0a0c0e;
      --bg1:#101216;
      --bg2:#1c2128;
      --bg3:#2a313a;
      --fg0:#dae0e6;
      --fg1:#a7afb7;
      --fg2:#7d8792;
      --acc:#ffaa00;
      --acc2:#00caff;
      --good:#44e68c;
      --bad:#ff5858;
      --warn:#ffc854;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --pad: 10px;
      --line: 1px solid var(--bg2);
      --radius: 10px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg0);
      color:var(--fg0);
      font-family:var(--mono);
      font-size:13px;
      line-height:1.3;
      overflow:hidden;
    }
    *{box-sizing:border-box;}
    a{color:inherit;}
    .app{
      display:grid;
      grid-template-rows: 52px 1fr 28px;
      height:100%;
      gap:10px;
      padding:10px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      border:var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg,rgba(16,18,22,0.9),rgba(10,12,14,0.9));
      padding:0 12px;
    }
    .brand{
      display:flex;
      align-items:baseline;
      gap:10px;
      letter-spacing:0.4px;
      user-select:none;
    }
    .brand .name{color:var(--acc); font-weight:700;}
    .brand .tag{color:var(--fg1);}
    .brand .meta{color:var(--fg2);}
    .btns{display:flex; gap:8px; align-items:center;}
    .btn{
      border:var(--line);
      background:var(--bg1);
      color:var(--fg0);
      padding:7px 10px;
      border-radius:8px;
      font: inherit;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{background:var(--bg2);}
    .btn.danger{color:var(--bad);}
    .btn.accent{color:var(--acc2);}
    .main{
      display:grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap:10px;
      min-height:0;
    }
    .panel{
      border:var(--line);
      border-radius:var(--radius);
      background:var(--bg0);
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .ph{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:9px 10px;
      background:var(--bg1);
      border-bottom:var(--line);
      border-top-left-radius:var(--radius);
      border-top-right-radius:var(--radius);
      gap:12px;
    }
    .ph .title{color:var(--acc); font-weight:700;}
    .ph .sub{color:var(--fg1);}
    .ph .tools{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    .pill{
      border:var(--line);
      background:var(--bg0);
      color:var(--fg1);
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      user-select:none;
    }
    .pill.good{color:var(--good);}
    .pill.bad{color:var(--bad);}
    .pill.warn{color:var(--warn);}
    .grid{
      display:grid;
      grid-template-rows: 230px 1fr;
      gap:10px;
      padding:10px;
      min-height:0;
    }
    .chartWrap{
      border:var(--line);
      border-radius:10px;
      background:var(--bg0);
      padding:10px;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .chartTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .k{
      color:var(--fg2);
    }
    .v{
      color:var(--fg0);
      font-weight:600;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      background:var(--bg0);
      border:var(--line);
      border-radius:10px;
    }
    .tables{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      min-height:0;
    }
    .table{
      border:var(--line);
      border-radius:10px;
      overflow:hidden;
      background:var(--bg0);
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .thead{
      display:grid;
      grid-template-columns: 110px 1fr 110px;
      gap:10px;
      padding:8px 10px;
      background:var(--bg1);
      color:var(--acc);
      border-bottom:var(--line);
      font-size:12px;
      user-select:none;
    }
    .tbody{
      overflow:auto;
      scrollbar-color: var(--bg3) var(--bg0);
      scrollbar-width: thin;
    }
    .tr{
      display:grid;
      grid-template-columns: 110px 1fr 110px;
      gap:10px;
      padding:7px 10px;
      border-bottom:1px solid rgba(28,33,40,0.65);
      color:var(--fg1);
    }
    .tr:hover{background:rgba(16,18,22,0.85);}
    .tr .sym{color:var(--fg0);}
    .tr .px{justify-self:end; color:var(--fg0);}
    .tr .tone{justify-self:end;}
    .tone.good{color:var(--good);}
    .tone.bad{color:var(--bad);}
    .tone.warn{color:var(--warn);}
    .right{
      display:grid;
      grid-template-rows: 1fr 1fr;
      gap:10px;
      padding:10px;
      min-height:0;
    }
    .term{
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .log{
      flex:1;
      overflow:auto;
      padding:10px;
      min-height:0;
      color:var(--fg1);
      scrollbar-color: var(--bg3) var(--bg0);
      scrollbar-width: thin;
      white-space:pre-wrap;
    }
    .log .dim{color:var(--fg2);}
    .log .acc{color:var(--acc);}
    .log .acc2{color:var(--acc2);}
    .log .good{color:var(--good);}
    .log .bad{color:var(--bad);}
    .log .warn{color:var(--warn);}
    .cmdRow{
      display:flex;
      align-items:center;
      border-top:var(--line);
      background:var(--bg0);
    }
    .prompt{
      padding:10px 10px 10px 12px;
      color:var(--acc);
      user-select:none;
    }
    .cmd{
      flex:1;
      padding:10px 12px 10px 0;
      border:none;
      outline:none;
      background:transparent;
      color:var(--fg0);
      font-family:var(--mono);
      font-size:13px;
    }
    .foot{
      border:var(--line);
      border-radius:var(--radius);
      background:var(--bg0);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      color:var(--fg2);
      user-select:none;
    }
    .foot .rt{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .monoTag{
      border:var(--line);
      padding:3px 8px;
      border-radius:999px;
      background:var(--bg1);
      color:var(--fg1);
    }
    .monoTag strong{color:var(--fg0);}
    .kbd{
      border:1px solid rgba(42,49,58,0.9);
      background:rgba(16,18,22,0.9);
      padding:2px 6px;
      border-radius:7px;
      color:var(--fg1);
      font-size:12px;
    }
    .hint{
      color:var(--fg2);
      font-size:12px;
    }
    .hide{display:none !important;}
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="top">
      <div class="brand">
        <div class="name">apex_pred</div>
        <div class="tag">degen terminal</div>
        <div class="meta" id="metaLine"></div>
      </div>
      <div class="btns">
        <button class="btn accent" id="btnHelp">HELP</button>
        <button class="btn" id="btnWatch">WATCH</button>
        <button class="btn" id="btnExport">EXPORT</button>
        <button class="btn danger" id="btnPanic">PANIC</button>
      </div>
    </div>

    <div class="main">
      <div class="panel">
        <div class="ph">
          <div>
            <div class="title" id="pxTitle">GRID / HOME</div>
            <div class="sub" id="pxSub">quotes • tape • alpha</div>
          </div>
          <div class="tools">
            <div class="pill" id="pillMode">MODE</div>
            <div class="pill" id="pillConn">OFFLINE</div>
            <div class="pill" id="pillSym">SYM</div>
          </div>
        </div>
        <div class="grid">
          <div class="chartWrap">
            <div class="chartTop">
              <div class="row">
                <div class="k">symbol</div>
                <div class="v" id="curSym">BTC-PERP</div>
                <div class="k">mid</div>
                <div class="v" id="curMid">—</div>
                <div class="k">chg</div>
                <div class="v" id="curChg">—</div>
                <div class="k">spr</div>
                <div class="v" id="curSpr">—</div>
                <div class="k">oi</div>
                <div class="v" id="curOi">—</div>
              </div>
              <div class="row">
                <span class="hint">keys</span>
                <span class="kbd">Ctrl</span><span class="kbd">K</span><span class="hint">cmd</span>
                <span class="kbd">Ctrl</span><span class="kbd">L</span><span class="hint">clear</span>
                <span class="kbd">Ctrl</span><span class="kbd">/</span><span class="hint">help</span>
              </div>
            </div>
            <div style="flex:1; min-height:0;">
              <canvas id="chart" width="1200" height="420"></canvas>
            </div>
          </div>

          <div class="tables">
            <div class="table">
              <div class="thead"><div>time</div><div>sym</div><div style="text-align:right;">print</div></div>
              <div class="tbody" id="tapeBody"></div>
            </div>
            <div class="table">
              <div class="thead"><div>time</div><div>sym</div><div style="text-align:right;">alpha</div></div>
              <div class="tbody" id="sigBody"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel term">
        <div class="ph">
          <div>
            <div class="title">OPS / CONSOLE</div>
            <div class="sub">commands • exports • settings</div>
          </div>
          <div class="tools">
            <div class="pill" id="pillFps">fps</div>
            <div class="pill" id="pillTick">tick</div>
          </div>
        </div>
        <div class="right">
          <div class="panel term" style="border:none;">
            <div class="ph" style="border:var(--line); border-radius:10px;">
              <div class="title">LOG</div>
              <div class="tools">
                <div class="pill" id="pillMem">mem</div>
                <div class="pill" id="pillStore">store</div>
              </div>
            </div>
            <div class="log" id="log"></div>
            <div class="cmdRow">
              <div class="prompt">&gt;</div>
              <input class="cmd" id="cmd" autocomplete="off" spellcheck="false" placeholder="help • watch add BTC-PERP • sym ETH-PERP • export • panic" />
            </div>
          </div>

          <div class="panel term" style="border:none;">
            <div class="ph" style="border:var(--line); border-radius:10px;">
              <div class="title">WATCH</div>
              <div class="tools">
                <div class="pill" id="pillWatch">0</div>
                <div class="pill" id="pillHot">hot</div>
              </div>
            </div>
            <div class="tbody" id="watchBody" style="border:var(--line); border-radius:10px; flex:1; background:var(--bg0);"></div>
            <div class="cmdRow" style="border:none;">
              <div class="prompt" style="color:var(--acc2);">+</div>
              <input class="cmd" id="watchIn" autocomplete="off" spellcheck="false" placeholder="add symbol (enter)  e.g. SOL-PERP" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <div class="lf" id="footLeft"></div>
      <div class="rt">
        <span class="monoTag"><strong>mode</strong> <span id="footMode"></span></span>
        <span class="monoTag"><strong>sym</strong> <span id="footSym"></span></span>
        <span class="monoTag"><strong>tick</strong> <span id="footTick"></span></span>
      </div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      const $ = (id)=>document.getElementById(id);
      const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));
      const now=()=>performance.now();
      const rint=(a,b)=>Math.floor(a+Math.random()*(b-a+1));
      const ts=()=>new Date().toLocaleTimeString([], {hour12:false}) + "." + String(new Date().getMilliseconds()).padStart(3,"0");
      const fmt=(x,dp)=>Number(x).toFixed(dp);
      const fmtSigned=(x,dp)=> (x>=0?"+":"") + fmt(x,dp);

      class Store{
        constructor(key){ this.key=key; }
        load(){
          try{
            const raw=localStorage.getItem(this.key);
            if(!raw) return null;
            const obj=JSON.parse(raw);
            if(!obj || typeof obj!=="object") return null;
            return obj;
          }catch(e){ return null; }
        }
        save(obj){
          try{ localStorage.setItem(this.key, JSON.stringify(obj)); }catch(e){}
        }
      }

      class Ring{
        constructor(cap){
          this.cap=cap;
          this.buf=new Array(cap);
          this.head=0;
          this.count=0;
        }
        push(v){
          this.buf[this.head]=v;
          this.head=(this.head+1)%this.cap;
          this.count=Math.min(this.count+1,this.cap);
        }
        newestFirst(n){
          const take=Math.min(n,this.count);
          const out=[];
          for(let i=0;i<take;i++){
            const idx=(this.head-1-i+this.cap)%this.cap;
            out.push(this.buf[idx]);
          }
          return out;
        }
      }

      class Engine{
        constructor(seed){
          this.seed=seed>>>0;
          this.panic=false;
          this.mode="NORMAL";
          this.syms=[
            "BTC-PERP","ETH-PERP","SOL-PERP","DOGE-PERP","PEPE-PERP","ARB-PERP",
            "SPX-INDEX","NDQ-INDEX","DXY","US10Y","WIF-PERP","TIA-PERP",
            "LINK-PERP","AVAX-PERP","BNB-PERP","OP-PERP"
          ];
          this.prof=this.mkProfiles();
          this.q=new Map();
          this.tape=new Ring(600);
          this.sig=new Ring(420);
          this.series=new Map();
          this.tick=0;
          this.init();
        }
        mkProfiles(){
          const mk=(anchor,vol,spreadBps,fundingBps,oi)=>({anchor,vol,spreadBps,fundingBps,oi, floor:Math.max(1e-12,anchor*1e-8)});
          const m=new Map();
          m.set("BTC-PERP",mk(64000,0.006,0.8,0.5,150e6));
          m.set("ETH-PERP",mk(3200,0.009,1.1,0.7,60e6));
          m.set("SOL-PERP",mk(145,0.018,1.9,1.2,12e6));
          m.set("DOGE-PERP",mk(0.18,0.025,3.5,2.3,6.5e6));
          m.set("PEPE-PERP",mk(0.000012,0.035,5.2,3.2,3.1e6));
          m.set("ARB-PERP",mk(1.21,0.022,2.6,1.7,8.4e6));
          m.set("SPX-INDEX",mk(5340,0.002,0.3,0.2,0));
          m.set("NDQ-INDEX",mk(18950,0.0022,0.35,0.22,0));
          m.set("DXY",mk(104.7,0.0012,0.18,0.12,0));
          m.set("US10Y",mk(4.31,0.0018,0.22,0.14,0));
          m.set("WIF-PERP",mk(2.4,0.042,6.5,4.1,2.6e6));
          m.set("TIA-PERP",mk(15.3,0.024,3.1,1.9,3.9e6));
          m.set("LINK-PERP",mk(17.8,0.018,2.2,1.5,7.3e6));
          m.set("AVAX-PERP",mk(37.4,0.020,2.5,1.6,4.8e6));
          m.set("BNB-PERP",mk(560,0.008,1.1,0.8,18e6));
          m.set("OP-PERP",mk(3.1,0.023,2.9,1.8,5.2e6));
          return m;
        }
        init(){
          for(const s of this.syms){
            const p=this.prof.get(s);
            this.q.set(s, {sym:s, ts:Date.now(), mid:p.anchor, spr:12, fnd:4, oi:p.oi, ch:0, vol1m:0.0});
            this.series.set(s, new Ring(420));
            this.series.get(s).push({t:Date.now(), y:p.anchor});
          }
        }
        togglePanic(){
          this.panic=!this.panic;
          this.mode=this.panic?"PANIC":"NORMAL";
        }
        stepQuotes(){
          const pan=this.panic;
          const t=Date.now();
          for(const s of this.syms){
            const p=this.prof.get(s);
            const prev=this.q.get(s);
            const vol=p.vol*(pan?1.7:1.0);
            let shock=randn()*vol;
            if(pan && Math.random()<0.04) shock += randn()*vol*4.3;
            let mid=Math.max(p.floor, prev.mid*(1+shock));
            let spr=p.spreadBps*(pan?1.8:1.0)*(0.7+Math.random()*0.8);
            let fnd=p.fundingBps*(0.4+Math.random()*1.2)*(pan?1.4:1.0);
            let oi=prev.oi;
            if(p.oi>0){
              let drift=randn()*(pan?0.009:0.003);
              oi=Math.max(0, oi*(1+drift));
              let lo=p.oi*0.45, hi=p.oi*1.85;
              oi=clamp(oi,lo,hi);
            }
            let ch=((mid/prev.mid)-1)*10000;
            let vol1m=0.85*prev.vol1m + 0.15*Math.abs(ch)/10000;
            const q={sym:s, ts:t, mid, spr:spr*100, fnd:fnd*100, oi, ch:ch*100, vol1m};
            this.q.set(s,q);
            this.series.get(s).push({t,y:mid});
          }
        }
        stepTape(){
          const t=Date.now();
          const prints=this.panic? rint(5,10) : rint(2,5);
          for(let i=0;i<prints;i++){
            const s=this.syms[rint(0,this.syms.length-1)];
            const q=this.q.get(s);
            const p=this.prof.get(s);
            const baseQty=Math.max(1, Math.sqrt(Math.max(1,p.anchor))*18)*(this.panic?1.3:1)*(0.65+Math.random()*1.8);
            const side=(Math.random()<0.51)?1:2;
            const px=q.mid*(1+randn()*(p.vol*0.35));
            const qty=Math.max(1, Math.floor(baseQty));
            this.tape.push({sym:s, ts:t, px, qty:(side===1?qty:-qty), side});
          }
        }
        stepSignals(){
          const t=Date.now();
          const s=this.syms[rint(0,this.syms.length-1)];
          const q=this.q.get(s);
          const p=this.prof.get(s);
          const trend=q.ch/100/10000;
          const nois=randn()*(this.panic?1.3:0.9);
          let sc=(trend*4200) + (nois*85);
          if(this.panic && Math.random()<0.1) sc+=randn()*250;
          sc=clamp(Math.round(sc),-9999,9999);
          const tag=this.tagFor(sc,p);
          const note=this.noteFor(sc,s);
          this.sig.push({sym:s, ts:t, score:sc, tag, note});
        }
        tagFor(score,p){
          const a=Math.abs(score);
          if(a>2200) return score>0?"BREAKOUT":"DUMP";
          if(a>1400) return score>0?"MOMO+":"MOMO-";
          if(a>800) return score>0?"BID":"ASK";
          if(a>450) return score>0?"DRIFT+":"DRIFT-";
          if(p.vol>0.02 && a>320) return score>0?"WICK+":"WICK-";
          return "MEAN";
        }
        noteFor(score,sym){
          const a=Math.abs(score);
          if(a>2200) return sym+" tape is loud; spreads widen";
          if(a>1400) return "one-way flow; watch liquidation pockets";
          if(a>800) return "momentum edge; fade only with size";
          if(a>450) return "range bleed; scalp timeframes";
          return "noise-chop; wait for better setup";
        }
      }

      function randn(){
        let u=0,v=0;
        while(u===0) u=Math.random();
        while(v===0) v=Math.random();
        return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
      }

      class Chart{
        constructor(canvas){
          this.c=canvas;
          this.ctx=canvas.getContext("2d", {alpha:false});
          this.dpr=Math.max(1, Math.min(2, window.devicePixelRatio||1));
          this.w=canvas.width;
          this.h=canvas.height;
          this.cursor=null;
          this.resize();
          window.addEventListener("resize", ()=>this.resize());
          canvas.addEventListener("mousemove",(e)=>{
            const r=canvas.getBoundingClientRect();
            this.cursor={x:(e.clientX-r.left), y:(e.clientY-r.top)};
          });
          canvas.addEventListener("mouseleave",()=>{this.cursor=null;});
        }
        resize(){
          const r=this.c.getBoundingClientRect();
          const w=Math.max(600, Math.floor(r.width));
          const h=Math.max(180, Math.floor(r.height));
          this.c.width=Math.floor(w*this.dpr);
          this.c.height=Math.floor(h*this.dpr);
          this.w=this.c.width; this.h=this.c.height;
        }
        draw(series, quote, tape, sig, mode){
          const ctx=this.ctx;
          ctx.save();
          ctx.scale(this.dpr,this.dpr);
          const W=this.w/this.dpr, H=this.h/this.dpr;
          ctx.fillStyle=getCss("--bg0"); ctx.fillRect(0,0,W,H);
          const pad=10;
          const gx=pad, gy=pad, gw=W-pad*2, gh=H-pad*2;

          const pts=series.newestFirst(240).reverse();
          if(pts.length<2){
            ctx.fillStyle=getCss("--fg2");
            ctx.fillText("no data", gx, gy+14);
            ctx.restore();
            return;
          }
          let ymin=Infinity, ymax=-Infinity;
          for(const p of pts){ ymin=Math.min(ymin,p.y); ymax=Math.max(ymax,p.y); }
          const ym=(ymax+ymin)/2;
          const span=Math.max(1e-12, (ymax-ymin));
          const padSpan=span*0.08;
          ymin-=padSpan; ymax+=padSpan;

          ctx.strokeStyle="rgba(42,49,58,0.9)";
          ctx.lineWidth=1;
          for(let i=0;i<=6;i++){
            const y=gy+(gh*(i/6));
            ctx.beginPath();
            ctx.moveTo(gx,y);
            ctx.lineTo(gx+gw,y);
            ctx.stroke();
          }
          for(let i=0;i<=10;i++){
            const x=gx+(gw*(i/10));
            ctx.beginPath();
            ctx.moveTo(x,gy);
            ctx.lineTo(x,gy+gh);
            ctx.stroke();
          }

          const lineAcc=getCss(mode==="PANIC"?"--warn":"--acc2");
          ctx.strokeStyle=lineAcc;
          ctx.lineWidth=2;
          ctx.beginPath();
          for(let i=0;i<pts.length;i++){
            const x=gx + (gw*(i/(pts.length-1)));
            const y=gy + (gh*(1-((pts[i].y - ymin)/(ymax-ymin))));
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
          }
          ctx.stroke();

          ctx.fillStyle="rgba(255,170,0,0.12)";
          ctx.beginPath();
          for(let i=0;i<pts.length;i++){
            const x=gx + (gw*(i/(pts.length-1)));
            const y=gy + (gh*(1-((pts[i].y - ymin)/(ymax-ymin))));
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
          }
          ctx.lineTo(gx+gw, gy+gh);
          ctx.lineTo(gx, gy+gh);
          ctx.closePath();
          ctx.fill();

          const last=pts[pts.length-1].y;
          const ch=quote ? (quote.ch/100) : 0;
          ctx.fillStyle=getCss("--fg1");
          ctx.font="12px "+getCss("--mono");
          const yLab=(v)=> gy + (gh*(1-((v - ymin)/(ymax-ymin))));
          ctx.fillText("hi "+fmt(ymax,6), gx+gw-120, gy+12);
          ctx.fillText("lo "+fmt(ymin,6), gx+gw-120, gy+gh-6);
          ctx.fillText("mid "+fmt(ym,6), gx+gw-120, yLab(ym));

          ctx.fillStyle=getCss("--fg0");
          ctx.fillText("last "+fmt(last,6), gx+12, gy+14);
          ctx.fillStyle=(ch>=0)?getCss("--good"):getCss("--bad");
          ctx.fillText("chg "+fmtSigned(ch,2)+"bp", gx+12, gy+30);

          const tp=tape.newestFirst(18).reverse();
          for(const p of tp){
            const px=p.px;
            const y=yLab(px);
            const x=gx + gw*(0.72 + Math.random()*0.26);
            ctx.fillStyle=p.side===1?"rgba(68,230,140,0.55)":"rgba(255,88,88,0.55)";
            ctx.fillRect(x, y-1, 8, 2);
          }

          const ss=sig.newestFirst(10).reverse();
          for(const s of ss){
            const a=Math.abs(s.score);
            if(a<450) continue;
            const x=gx + gw*(0.05 + Math.random()*0.6);
            const y=gy + gh*(0.08 + Math.random()*0.84);
            const col=s.score>=0? "rgba(68,230,140,0.55)" : "rgba(255,88,88,0.55)";
            ctx.fillStyle=col;
            ctx.beginPath();
            ctx.arc(x,y, Math.min(10, 4 + a/800), 0, Math.PI*2);
            ctx.fill();
          }

          if(this.cursor){
            const cx=this.cursor.x, cy=this.cursor.y;
            ctx.strokeStyle="rgba(218,224,230,0.15)";
            ctx.beginPath();
            ctx.moveTo(cx, gy);
            ctx.lineTo(cx, gy+gh);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(gx, cy);
            ctx.lineTo(gx+gw, cy);
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      function getCss(name){
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      }

      class UI{
        constructor(){
          this.store=new Store("apex_pred.state.v1");
          const st=this.store.load() || {};
          this.seed= (st.seed>>>0) || ((Date.now() ^ (Math.random()*1e9|0))>>>0);
          this.watch= new Set(Array.isArray(st.watch)? st.watch : ["BTC-PERP","ETH-PERP","SOL-PERP"]);
          this.sym = (typeof st.sym==="string" && st.sym) ? st.sym : "BTC-PERP";
          this.engine=new Engine(this.seed);
          this.chart=new Chart($("chart"));
          this.tick=0;
          this.lastT=now();
          this.frames=0;
          this.fps=0;
          this.logMax=650;
          this.bind();
          this.logBanner();
          this.renderAll(true);
          this.loop();
        }
        bind(){
          $("btnHelp").addEventListener("click", ()=>this.cmd("help"));
          $("btnWatch").addEventListener("click", ()=>this.cmd("watch"));
          $("btnExport").addEventListener("click", ()=>this.cmd("export"));
          $("btnPanic").addEventListener("click", ()=>this.cmd("panic"));
          $("cmd").addEventListener("keydown",(e)=>{
            if(e.key==="Enter"){
              const v=e.target.value.trim();
              if(!v) return;
              e.target.value="";
              this.logLine(`<span class="dim">&gt;</span> ${escapeHtml(v)}`);
              this.cmd(v);
            }else if(e.key==="Tab"){
              e.preventDefault();
              this.autocomplete();
            }
          });
          $("watchIn").addEventListener("keydown",(e)=>{
            if(e.key==="Enter"){
              const v=e.target.value.trim().toUpperCase();
              e.target.value="";
              if(!v) return;
              this.cmd("watch add "+v);
            }
          });
          document.addEventListener("keydown",(e)=>{
            if(e.ctrlKey && (e.key==="k"||e.key==="K")){
              e.preventDefault(); $("cmd").focus(); $("cmd").value="";
              return;
            }
            if(e.ctrlKey && (e.key==="l"||e.key==="L")){
              e.preventDefault(); this.clearLog(); return;
            }
            if(e.ctrlKey && e.key==="/"){
              e.preventDefault(); this.cmd("help"); return;
            }
          });
        }
        save(){
          const st={seed:this.seed, watch:[...this.watch], sym:this.sym};
          this.store.save(st);
          $("pillStore").textContent="store ok";
          setTimeout(()=>{$("pillStore").textContent="store";},700);
        }
        clearLog(){
          $("log").innerHTML="";
          this.logLine(`<span class="dim">${ts()}</span> <span class="acc">log cleared</span>`);
        }
        logBanner(){
          const meta=`seed 0x${this.seed.toString(16)} • local • no wallet`;
          $("metaLine").textContent=meta;
          this.logLine(`<span class="acc">apex_pred</span> <span class="dim">degen terminal</span>`);
          this.logLine(`<span class="dim">hotkeys</span> <span class="acc2">Ctrl+K</span><span class="dim"> cmd</span>  <span class="acc2">Ctrl+L</span><span class="dim"> clear</span>  <span class="acc2">Ctrl+/</span><span class="dim"> help</span>`);
          this.logLine(`<span class="dim">try</span> <span class="acc2">help</span><span class="dim">,</span> <span class="acc2">sym ETH-PERP</span><span class="dim">,</span> <span class="acc2">watch add SOL-PERP</span>`);
        }
        logLine(html){
          const log=$("log");
          const div=document.createElement("div");
          div.innerHTML=html;
          log.appendChild(div);
          while(log.children.length>this.logMax) log.removeChild(log.firstChild);
          log.scrollTop=log.scrollHeight;
        }
        cmd(line){
          const parts=smartSplit(line);
          if(parts.length===0) return;
          const c=parts[0].toLowerCase();
          if(c==="help"){
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">command map</span>`);
            this.logLine(`<span class="dim">help</span>  pages  sym &lt;SYM&gt;  tape [N]  signals [N]  watch add|rm|clear  export  panic  seed`);
            this.logLine(`<span class="dim">extras</span>  vwap [N]  imb [N]  hot  clear`);
            return;
          }
          if(c==="pages"){
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">pages</span> HOME • FLOW • ALPHA • OPS`);
            return;
          }
          if(c==="sym"){
            const s=(parts[1]||"").toUpperCase();
            if(!this.engine.syms.includes(s)){
              this.logLine(`<span class="dim">${ts()}</span> <span class="warn">unknown symbol</span> ${escapeHtml(s||"(missing)")}`);
              return;
            }
            this.sym=s;
            $("pillSym").textContent=s;
            $("footSym").textContent=s;
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc2">sym</span> ${escapeHtml(s)}`);
            this.save();
            return;
          }
          if(c==="seed"){
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">seed</span> 0x${this.seed.toString(16)}`);
            return;
          }
          if(c==="panic"){
            this.engine.togglePanic();
            $("pillMode").textContent=this.engine.mode;
            $("footMode").textContent=this.engine.mode;
            this.logLine(`<span class="dim">${ts()}</span> <span class="warn">mode</span> ${this.engine.mode}`);
            return;
          }
          if(c==="watch"){
            const sub=(parts[1]||"").toLowerCase();
            if(!sub){
              this.logLine(`<span class="dim">${ts()}</span> <span class="acc">watch</span> ${[...this.watch].join(", ")||"(empty)"}`);
              return;
            }
            if(sub==="add"){
              const s=(parts[2]||"").toUpperCase();
              if(!this.engine.syms.includes(s)){
                this.logLine(`<span class="dim">${ts()}</span> <span class="warn">unknown symbol</span> ${escapeHtml(s||"(missing)")}`);
                return;
              }
              this.watch.add(s);
              this.logLine(`<span class="dim">${ts()}</span> <span class="good">watch +</span> ${escapeHtml(s)}`);
              this.save();
              return;
            }
            if(sub==="rm"||sub==="remove"){
              const s=(parts[2]||"").toUpperCase();
              this.watch.delete(s);
              this.logLine(`<span class="dim">${ts()}</span> <span class="bad">watch -</span> ${escapeHtml(s||"(missing)")}`);
              this.save();
              return;
            }
            if(sub==="clear"){
              this.watch.clear();
              this.logLine(`<span class="dim">${ts()}</span> <span class="warn">watch cleared</span>`);
              this.save();
              return;
            }
            this.logLine(`<span class="dim">${ts()}</span> <span class="warn">usage</span> watch | watch add SYM | watch rm SYM | watch clear`);
            return;
          }
          if(c==="tape"){
            const n=clamp(parseInt(parts[1]||"16",10)||16, 1, 80);
            const rows=this.engine.tape.newestFirst(n);
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">tape</span> last ${n}`);
            for(const p of rows){
              const side=p.side===1? `<span class="good">BUY</span>` : `<span class="bad">SELL</span>`;
              this.logLine(`<span class="dim">${fmtTime(p.ts)}</span> <span class="acc2">${p.sym}</span> px ${fmt(p.px,6)} qty ${fmtInt(Math.abs(p.qty))} ${side}`);
            }
            return;
          }
          if(c==="signals"){
            const n=clamp(parseInt(parts[1]||"12",10)||12, 1, 80);
            const rows=this.engine.sig.newestFirst(n);
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">signals</span> last ${n}`);
            for(const s of rows){
              const tone=s.score>=0? "good":"bad";
              this.logLine(`<span class="dim">${fmtTime(s.ts)}</span> <span class="acc2">${s.sym}</span> <span class="${tone}">${fmtSigned(s.score/100,2)}</span> tag ${escapeHtml(s.tag)} <span class="dim">${escapeHtml(s.note)}</span>`);
            }
            return;
          }
          if(c==="vwap"){
            const n=clamp(parseInt(parts[1]||"24",10)||24, 2, 256);
            const rows=this.engine.tape.newestFirst(600).filter(x=>x.sym===this.sym).slice(0,n);
            const vwap=calcVwap(rows);
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">vwap</span> ${this.sym} n=${n} -> <span class="acc2">${fmt(vwap,6)}</span>`);
            return;
          }
          if(c==="imb"){
            const n=clamp(parseInt(parts[1]||"48",10)||48, 2, 256);
            const rows=this.engine.tape.newestFirst(600).filter(x=>x.sym===this.sym).slice(0,n);
            const imb=calcImb(rows);
            const tone=imb>=0?"good":"bad";
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">imb</span> ${this.sym} n=${n} -> <span class="${tone}">${fmtSigned(imb,2)}bp</span>`);
            return;
          }
          if(c==="hot"){
            const hot=rankHot(this.engine.q);
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">hot</span> (vol proxy)`);
            for(const x of hot.slice(0,10)){
              const tone=x.ch>=0? "good":"bad";
              this.logLine(`<span class="dim">•</span> <span class="acc2">${x.sym}</span> mid ${fmt(x.mid,6)} <span class="${tone}">${fmtSigned(x.ch,2)}bp</span> vol ${fmt(x.vol1m,4)}`);
            }
            return;
          }
          if(c==="export"){
            const blob=this.exportText();
            downloadText(`apex_pred_export_${Date.now()}.txt`, blob);
            this.logLine(`<span class="dim">${ts()}</span> <span class="acc">exported</span> snapshot text`);
            return;
          }
          if(c==="clear"){
            this.clearLog();
            return;
          }
          this.logLine(`<span class="dim">${ts()}</span> <span class="warn">unknown cmd</span> ${escapeHtml(c)} <span class="dim">(try help)</span>`);
        }
        exportText(){
          const lines=[];
          lines.push("apex_pred export");
          lines.push("seed 0x"+this.seed.toString(16));
          lines.push("mode "+this.engine.mode);
          lines.push("sym "+this.sym);
          lines.push("");
          lines.push("watch "+[...this.watch].join(","));
          lines.push("");
          const q=this.engine.q.get(this.sym);

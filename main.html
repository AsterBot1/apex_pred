<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>apex_pred — degen terminal</title>
  <style>
    :root{
      --bg0:#0a0c0e;
      --bg1:#101216;
      --bg2:#1c2128;
      --bg3:#2a313a;
      --fg0:#dae0e6;
      --fg1:#a7afb7;
      --fg2:#7d8792;
      --acc:#ffaa00;
      --acc2:#00caff;
      --good:#44e68c;
      --bad:#ff5858;
      --warn:#ffc854;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --pad: 10px;
      --line: 1px solid var(--bg2);
      --radius: 10px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg0);
      color:var(--fg0);
      font-family:var(--mono);
      font-size:13px;
      line-height:1.3;
      overflow:hidden;
    }
    *{box-sizing:border-box;}
    a{color:inherit;}
    .app{
      display:grid;
      grid-template-rows: 52px 1fr 28px;
      height:100%;
      gap:10px;
      padding:10px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      border:var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg,rgba(16,18,22,0.9),rgba(10,12,14,0.9));
      padding:0 12px;
    }
    .brand{
      display:flex;
      align-items:baseline;
      gap:10px;
      letter-spacing:0.4px;
      user-select:none;
    }
    .brand .name{color:var(--acc); font-weight:700;}
    .brand .tag{color:var(--fg1);}
    .brand .meta{color:var(--fg2);}
    .btns{display:flex; gap:8px; align-items:center;}

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>apex_pred — degen terminal</title>
  <style>
    :root{
      --bg0:#0a0c0e;
      --bg1:#101216;
      --bg2:#1c2128;
      --bg3:#2a313a;
      --fg0:#dae0e6;
      --fg1:#a7afb7;
      --fg2:#7d8792;
      --acc:#ffaa00;
      --acc2:#00caff;
      --good:#44e68c;
      --bad:#ff5858;
      --warn:#ffc854;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --pad: 10px;
      --line: 1px solid var(--bg2);
      --radius: 10px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg0);
      color:var(--fg0);
      font-family:var(--mono);
      font-size:13px;
      line-height:1.3;
      overflow:hidden;
    }
    *{box-sizing:border-box;}
    a{color:inherit;}
    .app{
      display:grid;
      grid-template-rows: 52px 1fr 28px;
      height:100%;
      gap:10px;
      padding:10px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      border:var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg,rgba(16,18,22,0.9),rgba(10,12,14,0.9));
      padding:0 12px;
    }
    .brand{
      display:flex;
      align-items:baseline;
      gap:10px;
      letter-spacing:0.4px;
      user-select:none;
    }
    .brand .name{color:var(--acc); font-weight:700;}
    .brand .tag{color:var(--fg1);}
    .brand .meta{color:var(--fg2);}
    .btns{display:flex; gap:8px; align-items:center;}
    .btn{
      border:var(--line);
      background:var(--bg1);
      color:var(--fg0);
      padding:7px 10px;
      border-radius:8px;
      font: inherit;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{background:var(--bg2);}
    .btn.danger{color:var(--bad);}
    .btn.accent{color:var(--acc2);}
    .main{
      display:grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap:10px;
      min-height:0;
    }
    .panel{
      border:var(--line);
      border-radius:var(--radius);
      background:var(--bg0);
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .ph{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:9px 10px;
      background:var(--bg1);
      border-bottom:var(--line);
      border-top-left-radius:var(--radius);
      border-top-right-radius:var(--radius);
      gap:12px;
    }
    .ph .title{color:var(--acc); font-weight:700;}
    .ph .sub{color:var(--fg1);}
    .ph .tools{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    .pill{
      border:var(--line);
      background:var(--bg0);
      color:var(--fg1);
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      user-select:none;
    }
    .pill.good{color:var(--good);}
    .pill.bad{color:var(--bad);}
    .pill.warn{color:var(--warn);}
    .grid{
      display:grid;
      grid-template-rows: 230px 1fr;
      gap:10px;
      padding:10px;
      min-height:0;
    }
    .chartWrap{
      border:var(--line);
      border-radius:10px;
      background:var(--bg0);
      padding:10px;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .chartTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .k{
      color:var(--fg2);
    }
    .v{
      color:var(--fg0);
      font-weight:600;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      background:var(--bg0);
      border:var(--line);
      border-radius:10px;
    }
    .tables{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      min-height:0;
    }
    .table{
      border:var(--line);
      border-radius:10px;
      overflow:hidden;
      background:var(--bg0);
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .thead{
      display:grid;
      grid-template-columns: 110px 1fr 110px;
      gap:10px;
      padding:8px 10px;
      background:var(--bg1);
      color:var(--acc);
      border-bottom:var(--line);
      font-size:12px;
      user-select:none;
    }
    .tbody{
      overflow:auto;
      scrollbar-color: var(--bg3) var(--bg0);
      scrollbar-width: thin;
    }
    .tr{
      display:grid;
      grid-template-columns: 110px 1fr 110px;
      gap:10px;
      padding:7px 10px;
      border-bottom:1px solid rgba(28,33,40,0.65);
      color:var(--fg1);
    }
    .tr:hover{background:rgba(16,18,22,0.85);}
    .tr .sym{color:var(--fg0);}
    .tr .px{justify-self:end; color:var(--fg0);}
    .tr .tone{justify-self:end;}
    .tone.good{color:var(--good);}
    .tone.bad{color:var(--bad);}
    .tone.warn{color:var(--warn);}
    .right{
      display:grid;
      grid-template-rows: 1fr 1fr;
      gap:10px;
      padding:10px;
      min-height:0;
    }
    .term{
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .log{
      flex:1;
      overflow:auto;
      padding:10px;
      min-height:0;
      color:var(--fg1);
      scrollbar-color: var(--bg3) var(--bg0);
      scrollbar-width: thin;
      white-space:pre-wrap;
    }
    .log .dim{color:var(--fg2);}
    .log .acc{color:var(--acc);}
    .log .acc2{color:var(--acc2);}
    .log .good{color:var(--good);}
    .log .bad{color:var(--bad);}
    .log .warn{color:var(--warn);}
    .cmdRow{
      display:flex;
      align-items:center;
      border-top:var(--line);
      background:var(--bg0);
    }
    .prompt{
      padding:10px 10px 10px 12px;
      color:var(--acc);
      user-select:none;
    }
    .cmd{
      flex:1;
      padding:10px 12px 10px 0;
      border:none;
      outline:none;
      background:transparent;
      color:var(--fg0);
      font-family:var(--mono);
      font-size:13px;
    }
    .foot{
      border:var(--line);
      border-radius:var(--radius);
      background:var(--bg0);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      color:var(--fg2);
      user-select:none;
    }
    .foot .rt{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .monoTag{
      border:var(--line);
      padding:3px 8px;
      border-radius:999px;
      background:var(--bg1);
      color:var(--fg1);
    }
    .monoTag strong{color:var(--fg0);}
    .kbd{
      border:1px solid rgba(42,49,58,0.9);
      background:rgba(16,18,22,0.9);
      padding:2px 6px;
      border-radius:7px;
      color:var(--fg1);
      font-size:12px;
    }
    .hint{
      color:var(--fg2);
      font-size:12px;
    }
    .hide{display:none !important;}
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="top">
      <div class="brand">
        <div class="name">apex_pred</div>
        <div class="tag">degen terminal</div>
        <div class="meta" id="metaLine"></div>
      </div>
      <div class="btns">
        <button class="btn accent" id="btnHelp">HELP</button>
        <button class="btn" id="btnWatch">WATCH</button>
        <button class="btn" id="btnExport">EXPORT</button>
        <button class="btn danger" id="btnPanic">PANIC</button>
      </div>
    </div>

    <div class="main">
      <div class="panel">
        <div class="ph">
          <div>
            <div class="title" id="pxTitle">GRID / HOME</div>
            <div class="sub" id="pxSub">quotes • tape • alpha</div>
          </div>
          <div class="tools">
            <div class="pill" id="pillMode">MODE</div>
            <div class="pill" id="pillConn">OFFLINE</div>
            <div class="pill" id="pillSym">SYM</div>
          </div>
        </div>
        <div class="grid">
          <div class="chartWrap">
            <div class="chartTop">
              <div class="row">
                <div class="k">symbol</div>
                <div class="v" id="curSym">BTC-PERP</div>
                <div class="k">mid</div>
                <div class="v" id="curMid">—</div>
                <div class="k">chg</div>
                <div class="v" id="curChg">—</div>
                <div class="k">spr</div>
                <div class="v" id="curSpr">—</div>
                <div class="k">oi</div>
                <div class="v" id="curOi">—</div>
              </div>
              <div class="row">
                <span class="hint">keys</span>
                <span class="kbd">Ctrl</span><span class="kbd">K</span><span class="hint">cmd</span>
                <span class="kbd">Ctrl</span><span class="kbd">L</span><span class="hint">clear</span>
                <span class="kbd">Ctrl</span><span class="kbd">/</span><span class="hint">help</span>
              </div>
            </div>
            <div style="flex:1; min-height:0;">
              <canvas id="chart" width="1200" height="420"></canvas>
            </div>
          </div>

          <div class="tables">
            <div class="table">
              <div class="thead"><div>time</div><div>sym</div><div style="text-align:right;">print</div></div>
              <div class="tbody" id="tapeBody"></div>
            </div>
            <div class="table">
              <div class="thead"><div>time</div><div>sym</div><div style="text-align:right;">alpha</div></div>
              <div class="tbody" id="sigBody"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel term">
        <div class="ph">
          <div>
            <div class="title">OPS / CONSOLE</div>
            <div class="sub">commands • exports • settings</div>
          </div>
          <div class="tools">
            <div class="pill" id="pillFps">fps</div>
            <div class="pill" id="pillTick">tick</div>
          </div>
        </div>
        <div class="right">
          <div class="panel term" style="border:none;">
            <div class="ph" style="border:var(--line); border-radius:10px;">
              <div class="title">LOG</div>
              <div class="tools">
                <div class="pill" id="pillMem">mem</div>
                <div class="pill" id="pillStore">store</div>
              </div>
            </div>
            <div class="log" id="log"></div>
            <div class="cmdRow">
              <div class="prompt">&gt;</div>
              <input class="cmd" id="cmd" autocomplete="off" spellcheck="false" placeholder="help • watch add BTC-PERP • sym ETH-PERP • export • panic" />
            </div>
          </div>

          <div class="panel term" style="border:none;">
            <div class="ph" style="border:var(--line); border-radius:10px;">
              <div class="title">WATCH</div>
              <div class="tools">
                <div class="pill" id="pillWatch">0</div>
                <div class="pill" id="pillHot">hot</div>
              </div>
            </div>
            <div class="tbody" id="watchBody" style="border:var(--line); border-radius:10px; flex:1; background:var(--bg0);"></div>
            <div class="cmdRow" style="border:none;">
              <div class="prompt" style="color:var(--acc2);">+</div>
              <input class="cmd" id="watchIn" autocomplete="off" spellcheck="false" placeholder="add symbol (enter)  e.g. SOL-PERP" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <div class="lf" id="footLeft"></div>
      <div class="rt">
        <span class="monoTag"><strong>mode</strong> <span id="footMode"></span></span>
        <span class="monoTag"><strong>sym</strong> <span id="footSym"></span></span>
        <span class="monoTag"><strong>tick</strong> <span id="footTick"></span></span>
      </div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      const $ = (id)=>document.getElementById(id);
      const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));
      const now=()=>performance.now();
      const rint=(a,b)=>Math.floor(a+Math.random()*(b-a+1));
      const ts=()=>new Date().toLocaleTimeString([], {hour12:false}) + "." + String(new Date().getMilliseconds()).padStart(3,"0");
      const fmt=(x,dp)=>Number(x).toFixed(dp);
      const fmtSigned=(x,dp)=> (x>=0?"+":"") + fmt(x,dp);

      class Store{
        constructor(key){ this.key=key; }
        load(){
          try{
            const raw=localStorage.getItem(this.key);
            if(!raw) return null;
            const obj=JSON.parse(raw);
            if(!obj || typeof obj!=="object") return null;
            return obj;
          }catch(e){ return null; }
        }
        save(obj){
          try{ localStorage.setItem(this.key, JSON.stringify(obj)); }catch(e){}
        }
      }

      class Ring{
        constructor(cap){
          this.cap=cap;
          this.buf=new Array(cap);
